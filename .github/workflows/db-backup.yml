name: Database backup

on:
  schedule:
    - cron: "0 9 * * *" # 09:00 UTC nightly
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Dump database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          docker run --rm -e SUPABASE_DB_URL -v "$PWD:/backup" postgres:17 \
            pg_dump "$SUPABASE_DB_URL" --no-owner --no-privileges -F c -f /backup/rekodo-backup.dump

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: rekodo-backup-${{ github.run_id }}
          path: rekodo-backup.dump
          retention-days: 90
